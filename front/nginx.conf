server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA-friendly fallback: any unknown path returns index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-term caching for hashed build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
